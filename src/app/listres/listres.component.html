<!-- Bouton global Ajouter -->
<button class="btn btn-primary" routerLink="/ajouter">Ajouter</button>
<br /><br />

<!-- Champ de recherche (optionnel) -->
<div class="input-group">
  <div class="input-group-prepend">
    <span class="input-group-text">Search</span>
  </div>
  <input
    type="text"
    aria-label="Search"
    class="form-control"
    [(ngModel)]="search"
  />
</div>

<br />

<!-- Liste des résidences -->
<div class="row">
  <div class="card m-3" style="width: 18rem" *ngFor="let a of searchbytitle()">
    <div class="card-body">
      <h5 class="card-title">{{ a.name }}</h5>
      <p class="card-text">{{ a.address }}</p>

      <!-- 3 boutons pour chaque résidence -->
      <button class="btn btn-danger" (click)="deleteres(a.id)">
        Supprimer
      </button>

      <button class="btn btn-info" [routerLink]="['/detail', a.id]">
        Détails
      </button>

      <!-- Si tu veux garder Ajouter aux favoris -->
      <button class="btn btn-success" (click)="ajouter(a)">
        Ajouter aux favoris
      </button>
    </div>
  </div>
</div>
